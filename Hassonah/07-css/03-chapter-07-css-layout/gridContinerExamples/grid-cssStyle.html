<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width" />
  <style>
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px; /* optional: adds space between images */
    }
    .container img {
      display: block;
      width: 100%; /* makes images responsive within their grid cell */
      height: auto;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="images/art-1.jpg" alt="Image 1" />
    <img src="images/art-2.jpg" alt="Image 2" />
    <img src="images/art-3.jpg" alt="Image 3" />
    <img src="images/art-4.jpg" alt="Image 4" />
  </div>

</body>
</html>
