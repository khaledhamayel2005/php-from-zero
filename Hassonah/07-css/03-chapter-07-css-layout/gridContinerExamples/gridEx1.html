<!DOCTYPE html>
<html>
    <head>
        <style>
        .container {
        display: grid;
        gap: 10px;
        height: 300px;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 80px 30px 50px;
        }
        div div {
        background-color:cyan;
        text-align: center;
        padding: 20px 0;
        font-size: 30px;
    }
        </style>

    </head>
    <body>
        <div class="container">
            <div>A</div>
            <div>B</div>
            <div>C</div>
            <div>AA</div>
            <div>BB</div>
            <div>CC</div>
            <div>DA</div>
            <div>DB</div>
            <div>DC</div>
         </div>
    </body>
</html>
