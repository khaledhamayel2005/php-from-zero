<!doctype html>

<!-- HTML example -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sample layout using semantic elements</title>
  </head>
  <body>
    <h2>Details Element</h2>
    <details>
      <summary>Image</summary>
      <img src="images/airplane.jpg" /><br />
      <p>Museum: Royal Picture Gallery Mauritshuis ...</p>
    </details>
    <details>
      <summary>Artist</summary>
      <p><strong>Jan Vermeer</strong> was a Dutch ...</p>
    </details>
    <details>
      <summary>Information</summary>
      <p>
        Date: 1665<br />
        Medium: Oil on Canvas
      </p>
    </details>
    <details>
      <summary>Relative Path</summary>
      <img src="../images/airplane.jpg" /><br />
      <p>Museum: Royal Picture Gallery Mauritshuis ...</p>
    </details>
  </body>
</html>
