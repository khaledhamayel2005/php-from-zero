<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وكالة الظل - وحدة العمليات السوداء</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ9QK/6vvKMF4p7LMwN9s3y7j3iQG5k=" crossorigin="">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <section id="loginPage" class="login-page">
    <form id="loginForm" class="login-card" autocomplete="off">
      <div class="blood-mark">🩸</div>
      <h1>وكالة الظل</h1>
      <p>☠️ وحدة العمليات السوداء ⚠️</p>

      <label for="accessCode">رمز الدخول</label>
      <input id="accessCode" type="password" placeholder="أدخل الرمز" required>

      <label for="agentName">الاسم الحركي</label>
      <input id="agentName" type="text" placeholder="مثال: الشبح الأحمر" required>

      <button class="btn primary full" type="submit">🗝️ دخول إلى وكالة الظل</button>
    </form>
    <footer class="tiny-footer">جميع البيانات خيالية ومخزنة محليًا. لا توجد مراقبة حقيقية.</footer>
  </section>

  <section id="appPage" class="app-page hidden">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn mobile-only" type="button" title="القائمة">☰</button>
      <div class="brand">
        <span class="brand-icon">🕯️</span>
        <div>
          <strong>وكالة الظل</strong>
          <small>وحدة العمليات السوداء</small>
        </div>
      </div>

      <div class="search-box">
        <span>⌖</span>
        <input id="searchInput" type="search" placeholder="بحث عام في الأهداف والعمليات والتحليلات">
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="top-stats">
        <label class="agent-chip">🕶️ <input id="codenameInput" type="text" aria-label="الاسم الحركي"></label>
        <span>⚫ التهديد: <b>أسود</b></span>
        <span>☠️ أهداف: <b id="activeTargets">0</b></span>
        <span>🔥 عمليات: <b id="activeOperations">0</b></span>
        <button id="logoutBtn" class="btn danger small" type="button">🚪 خروج</button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <button class="nav active" data-page="dashboard">🧿 لوحة التحكم</button>
      <button class="nav" data-page="targets">🎯 الأهداف</button>
      <button class="nav" data-page="operations">🔥 العمليات الخاصة</button>
      <button class="nav" data-page="terminations">☠️ سجل التصفية</button>
      <button class="nav" data-page="analysis">🧠 التحليل النفسي</button>
      <button class="nav" data-page="map">🩸 خريطة فلسطين</button>
      <button class="nav" data-page="missions">📓 سجل المهام</button>
      <div class="side-seal">⛓️ ☠️ 🩸</div>
    </aside>

    <main id="content" class="content"></main>
  </section>

  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast"></div>

  <!-- كل شيء يعمل محليًا داخل المتصفح، ولا يتم إرسال البيانات لأي خادم. -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/targets.js"></script>
  <script src="js/views/operations.js"></script>
  <script src="js/views/terminations.js"></script>
  <script src="js/views/analysis.js"></script>
  <script src="js/views/missions.js"></script>
  <script src="js/features/map.js"></script>
  <script src="js/features/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
